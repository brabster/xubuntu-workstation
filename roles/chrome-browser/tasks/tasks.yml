---
# tasks file for chrome-browser
- name: Fetch Chrome Browser
  ansible.builtin.get_url:
    url: https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
    dest: /tmp/google-chrome.deb
    mode: '0644'

# libasound2t64 is the current name for the ALSA shared library on Ubuntu 24.04+.
# Pre-installing it satisfies Chrome's runtime library requirement before apt
# attempts to resolve the package metadata dependency on libasound2.
- name: Resolve virtual package dependencies
  ansible.builtin.apt:
    name: libasound2t64
    state: present
    update_cache: true

- name: Install Chrome
  ansible.builtin.apt:
    deb: /tmp/google-chrome.deb
