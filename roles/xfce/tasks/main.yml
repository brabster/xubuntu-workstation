---
- name: Install xfconf cli tool
  ansible.builtin.package:
    name:
      - xfconf
    state: present

- name: Prepare directory for Thunar shortcut
  ansible.builtin.file:
    path: '{{ user_home }}/.config/Thunar'
    state: directory
    mode: '0755'
    owner: '{{ username }}'

- name: Ensure xfce4 xfconf per-channel XML configuration directory exists
  ansible.builtin.file:
    path: '{{ user_home }}/.config/xfce4/xfconf/xfce-perchannel-xml'
    state: directory
    mode: '0700'
    owner: '{{ username }}'

# Deploy keyboard shortcuts config directly as XML - avoids needing X11/D-Bus
# (xfconf-query cannot autolaunch D-Bus without X11 display).
# Configures Super+Left/Right/Up/Down tile shortcuts under the xfwm4 section.
- name: Deploy xfce4 keyboard shortcuts configuration with tile left/right
  ansible.builtin.template:
    src: xfce4-keyboard-shortcuts.xml.j2
    dest: '{{ user_home }}/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-keyboard-shortcuts.xml'
    owner: '{{ username }}'
    mode: '0600'

# In Ubuntu 25.04+, xfce4-whiskermenu-plugin can grab the Super key at the
# panel level, preventing xfwm4 from receiving Super+Left/Right tile shortcuts.
# Disable the Super key trigger (button-trigger=0) in all whisker menu RC files.
- name: Find whisker menu panel plugin configuration files
  ansible.builtin.find:
    paths: '{{ user_home }}/.config/xfce4/panel'
    patterns: 'whiskermenu-*.rc'
  register: whisker_menu_configs

- name: Disable whisker menu Super key grab to allow tile left/right shortcuts
  ansible.builtin.lineinfile:
    path: '{{ item.path }}'
    regexp: '^button-trigger='
    line: 'button-trigger=0'
  loop: '{{ whisker_menu_configs.files }}'
